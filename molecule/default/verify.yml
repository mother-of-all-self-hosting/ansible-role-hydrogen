---
- name: Verify Hydrogen systemd service
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for Hydrogen service to become active (up to 180s)
      ansible.builtin.systemd:
        name: hydrogen.service
      register: hydrogen_service
      until: hydrogen_service.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert Hydrogen service is active
      ansible.builtin.assert:
        that: hydrogen_service.status.ActiveState == 'active'
        fail_msg: "hydrogen.service not active ({{ hydrogen_service.status.ActiveState }})"
        success_msg: "hydrogen.service is active"

    - name: Wait for Hydrogen HTTP endpoint to respond (up to 10m)
      ansible.builtin.uri:
        url: "http://localhost:8080/"
        method: GET
        status_code: [200, 302]
        follow_redirects: none
      register: hydrogen_endpoint
      until: hydrogen_endpoint.status in [200, 302]
      retries: 120
      delay: 5

    - name: Assert Hydrogen HTTP endpoint responds
      ansible.builtin.assert:
        that: hydrogen_endpoint.status in [200, 302]
        fail_msg: "Hydrogen did not respond as expected ({{ hydrogen_endpoint.status | default('no response') }})"
        success_msg: "Hydrogen responded with {{ hydrogen_endpoint.status }}"

    - name: Show Hydrogen systemd service status summary
      ansible.builtin.debug:
        msg:
          - "Hydrogen systemd: {{ hydrogen_service.status.ActiveState }}"
          - "Hydrogen HTTP: {{ hydrogen_endpoint.status }}"
